# Program Tracker — nginx reverse proxy + TLS + IP allowlist.
#
# deploy/deploy.sh substitutes the placeholders before installing this to
# /etc/nginx/conf.d/program-tracker.conf:
#   __DOMAIN__       -> str.example.com
#   __ALLOW_RULES__  -> one `allow <ip>;` line per allowlisted IP
# The cert must already exist (issued once by deploy/setup-vm.sh via certbot).

upstream program_tracker {
    # Single app instance. Add more `server 127.0.0.1:<port>;` lines to load-balance.
    server 127.0.0.1:3000;
    keepalive 16;
}

# --- HTTP :80 — public, for ACME renewals + redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Let's Encrypt HTTP-01 challenge (must stay reachable from the internet).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS :443 — the app, restricted to the allowlisted IPs ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # nginx is internet-facing, so $remote_addr is the real client.
__ALLOW_RULES__
    deny all;

    location / {
        proxy_pass http://program_tracker;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
